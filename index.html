<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background-color: #f3f4f6;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">
      <div id="login-screen">
        <h2 class="text-2xl font-bold mb-4 text-center">Admin Login</h2>
        <input type="password" id="passkey-input" placeholder="Enter Admin Passkey" class="w-full border rounded p-2 mb-4" />
        <button id="login-btn" class="w-full bg-blue-600 text-white rounded p-2 hover:bg-blue-700">Login</button>
        <p id="login-error" class="text-red-500 text-sm mt-2 hidden"></p>
      </div>

      <div id="dashboard-screen" class="hidden">
        <h2 class="text-2xl font-bold mb-4 text-center">Admin Dashboard</h2>
        <div class="flex items-center justify-between mb-4 p-4 border rounded bg-gray-50">
          <span class="font-medium">Agents Status</span>
          <span id="status-badge" class="px-3 py-1 rounded text-sm font-bold bg-gray-200 text-gray-700">Disabled</span>
        </div>
        <button id="toggle-btn" class="w-full bg-indigo-600 text-white rounded p-2 hover:bg-indigo-700 mb-4">Toggle Agents</button>
        <button id="logout-btn" class="w-full border text-gray-600 rounded p-2 hover:bg-gray-100">Logout</button>
      </div>
    </div>

    <script>
      const loginScreen = document.getElementById('login-screen');
      const dashboardScreen = document.getElementById('dashboard-screen');
      const passkeyInput = document.getElementById('passkey-input');
      const loginBtn = document.getElementById('login-btn');
      const loginError = document.getElementById('login-error');
      const toggleBtn = document.getElementById('toggle-btn');
      const logoutBtn = document.getElementById('logout-btn');
      const statusBadge = document.getElementById('status-badge');

      let token = localStorage.getItem('adminToken');
      let agentsEnabled = false;

      const updateDashboard = () => {
        statusBadge.textContent = agentsEnabled ? 'Enabled' : 'Disabled';
        statusBadge.className = agentsEnabled 
          ? 'px-3 py-1 rounded text-sm font-bold bg-green-100 text-green-800'
          : 'px-3 py-1 rounded text-sm font-bold bg-gray-200 text-gray-700';
      };

      const fetchStatus = async () => {
        try {
          const res = await fetch('/api/agents/status', {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            const data = await res.json();
            agentsEnabled = data.enabled;
            updateDashboard();
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
          } else {
            logout();
          }
        } catch (err) {
          console.error(err);
        }
      };

      const login = async () => {
        const passkey = passkeyInput.value;
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ passkey })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          localStorage.setItem('adminToken', token);
          loginError.classList.add('hidden');
          fetchStatus();
        } else {
          loginError.textContent = data.error;
          loginError.classList.remove('hidden');
        }
      };

      const toggleAgents = async () => {
        const res = await fetch('/api/agents/toggle', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ enabled: !agentsEnabled })
        });
        if (res.ok) {
          const data = await res.json();
          agentsEnabled = data.enabled;
          updateDashboard();
        }
      };

      const logout = () => {
        token = null;
        localStorage.removeItem('adminToken');
        dashboardScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
        passkeyInput.value = '';
      };

      loginBtn.addEventListener('click', login);
      toggleBtn.addEventListener('click', toggleAgents);
      logoutBtn.addEventListener('click', logout);

      if (token) {
        fetchStatus();
      }
    </script>
  </body>
</html>
