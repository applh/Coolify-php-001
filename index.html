<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHP Coolify Starter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background: #050505; color: #a1a1aa; font-family: ui-sans-serif, system-ui, sans-serif; }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center">
    <div class="text-center p-8 bg-zinc-900 border border-zinc-800 rounded-2xl max-w-md">
      <div class="w-12 h-12 bg-orange-500 rounded-xl mx-auto mb-6 flex items-center justify-center text-black font-bold text-xs">PHP 8.5</div>
      <h1 class="text-white text-xl font-semibold mb-2">PHP Coolify Starter</h1>
      <p class="text-sm mb-6 leading-relaxed">Your PHP application is ready for export. The production files are located in the root and <code>public/</code> directory.</p>
      <div class="space-y-2 text-left text-[10px] font-mono bg-black/50 p-4 rounded-lg">
        <div class="flex justify-between"><span>/public/index.php</span> <span class="text-green-500">✓</span></div>
        <div class="flex justify-between"><span>/nginx.conf</span> <span class="text-green-500">✓</span></div>
        <div class="flex justify-between"><span>/Dockerfile (FPM 8.5)</span> <span class="text-green-500">✓</span></div>
        <div class="flex justify-between"><span>/docker-compose.yml</span> <span class="text-green-500">✓</span></div>
      </div>
      <div class="mt-8 pt-6 border-t border-zinc-800">
        <p class="text-[9px] uppercase tracking-widest text-zinc-600 mb-4">Export to GitHub for Coolify</p>
        <div class="flex flex-col gap-2">
            <button class="w-full py-2 bg-white text-black rounded text-[10px] font-bold">READY TO DEPLOY</button>
        </div>
      </div>
    </div>
  </body>
</html>
