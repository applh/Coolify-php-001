services:
  # 1. CORE: Node.js Management Dashboard (Central Controller)
  cms-manager:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - cms_data:/app/data
      - php_content:/app/repo-php/content
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_ADMIN_PASSKEY=${APP_ADMIN_PASSKEY}
    networks:
      - cms-mesh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/sites"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

networks:
  cms-mesh:
    driver: bridge

volumes:
  cms_data:
  php_content:
