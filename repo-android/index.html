<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android App Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="p-8 text-center bg-blue-600">
            <h1 class="text-3xl font-bold text-white mb-2">Android App</h1>
            <p class="text-blue-100 text-sm">Download the latest version</p>
        </div>
        
        <div class="p-8 flex flex-col items-center">
            <div id="qrcode" class="mb-8 p-4 bg-white rounded-xl shadow-sm border border-slate-200"></div>
            
            <p class="text-slate-500 mb-6 text-center text-sm">Scan the QR code with your Android device or click the button below to download the app directly.</p>
            
            <a href="app.apk" 
               class="w-full flex items-center justify-center py-3.5 px-6 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 transition-colors shadow-sm focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download APK
            </a>
        </div>
        
        <div class="bg-slate-50 p-4 text-center text-xs text-slate-400 border-t border-slate-100">
            Latest build available
        </div>
    </div>

    <script>
        // Generate QR code using the current URL path pointing to the APK
        window.onload = function() {
            var apkUrl = window.location.href.split('?')[0].split('#')[0];
            if (!apkUrl.endsWith('/')) {
              apkUrl = apkUrl.substring(0, apkUrl.lastIndexOf('/') + 1);
            }
            apkUrl += 'app.apk';

            new QRCode(document.getElementById("qrcode"), {
                text: apkUrl,
                width: 200,
                height: 200,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
